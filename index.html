<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Price Tracker</title>

  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --text:#f5f7ff;
      --muted:#aab3d1;
      --accent:#6ea8fe;
      --chip:#1d274a;
      --ok:#2ecc71;
      --warn:#ffb020;
      --bad:#ff6b6b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100dvh;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 4.8vw, 1.8rem);
      line-height: 1.2;
    }

    .route {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: .95rem;
    }

    .price {
      font-size: clamp(2rem, 10vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      margin: 8px 0;
      word-break: break-word;
      letter-spacing: .2px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 700;
      background: var(--chip);
      color: var(--muted);
    }

    .badge.ok { color: var(--ok); }
    .badge.warn { color: var(--warn); }
    .badge.bad { color: var(--bad); }

    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #0b1020;
      font-weight: 700;
      padding: 12px 14px;
      min-height: 44px;
      cursor: pointer;
    }

    button.secondary {
      background: #2a3768;
      color: #dfe8ff;
    }

    .tiny {
      margin-top: 14px;
      color: #7f8ab0;
      font-size: .78rem;
    }

    .error {
      margin-top: 12px;
      color: var(--bad);
      font-size: .9rem;
      display: none;
    }

    pre, code {
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width:380px){
      body { padding: 12px; }
      .card { padding: 14px; border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Flight Price Tracker</h1>
      <p id="route" class="route">Loading route…</p>

      <div id="price" class="price">Loading…</div>

      <div class="row">
        <span id="trendBadge" class="badge">Checking trend…</span>
        <span id="statusBadge" class="badge">Waiting for data…</span>
      </div>

      <div class="meta">
        <div>Last updated: <span id="updatedAt">--</span></div>
        <div>Next auto-refresh: <span id="countdown">05:00</span></div>
      </div>

      <div class="actions">
        <button id="refreshBtn">Refresh now</button>
        <button id="openLinkBtn" class="secondary" type="button">Open flight link</button>
      </div>

      <div id="errorBox" class="error"></div>
      <div class="tiny">This page refreshes <strong>flight.json</strong> every 5 minutes.</div>
    </section>
  </main>

  <script>
    // ===== Config =====
    const REFRESH_MS = 5 * 60 * 1000; // 5 minutes
    const JSON_PATH = "flight.json";

    // ===== Elements =====
    const routeEl = document.getElementById("route");
    const priceEl = document.getElementById("price");
    const updatedAtEl = document.getElementById("updatedAt");
    const trendBadgeEl = document.getElementById("trendBadge");
    const statusBadgeEl = document.getElementById("statusBadge");
    const countdownEl = document.getElementById("countdown");
    const errorBoxEl = document.getElementById("errorBox");
    const refreshBtn = document.getElementById("refreshBtn");
    const openLinkBtn = document.getElementById("openLinkBtn");

    let nextTick = Date.now() + REFRESH_MS;
    let latestBookingUrl = "";

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function formatCountdown(ms) {
      const sec = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${pad2(m)}:${pad2(s)}`;
    }

    function showError(msg) {
      errorBoxEl.style.display = "block";
      errorBoxEl.textContent = msg;
    }

    function hideError() {
      errorBoxEl.style.display = "none";
      errorBoxEl.textContent = "";
    }

    function formatPrice(value, currency = "HKD") {
      if (value === null || value === undefined || value === "") return "N/A";
      const n = Number(String(value).replace(/[^\d.-]/g, ""));
      if (Number.isFinite(n)) {
        try {
          return new Intl.NumberFormat("en-HK", {
            style: "currency",
            currency,
            maximumFractionDigits: 0
          }).format(n);
        } catch {
          return `${currency} ${n.toLocaleString()}`;
        }
      }
      return String(value);
    }

    function safeDate(input) {
      if (!input) return "--";
      const d = new Date(input);
      if (Number.isNaN(d.getTime())) return String(input);
      return d.toLocaleString();
    }

    function get(obj, keys, fallback = "") {
      for (const k of keys) {
        if (obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== "") return obj[k];
      }
      return fallback;
    }

    function updateTrend(currentPriceNumber) {
      const key = "last_price_value";
      const oldRaw = localStorage.getItem(key);
      const oldVal = oldRaw !== null ? Number(oldRaw) : null;

      trendBadgeEl.className = "badge";
      if (!Number.isFinite(currentPriceNumber)) {
        trendBadgeEl.textContent = "Trend: N/A";
        return;
      }

      if (!Number.isFinite(oldVal)) {
        trendBadgeEl.textContent = "Trend: first check";
      } else if (currentPriceNumber < oldVal) {
        trendBadgeEl.textContent = `Trend: ↓ ${Math.round(oldVal - currentPriceNumber).toLocaleString()} cheaper`;
        trendBadgeEl.classList.add("ok");
      } else if (currentPriceNumber > oldVal) {
        trendBadgeEl.textContent = `Trend: ↑ ${Math.round(currentPriceNumber - oldVal).toLocaleString()} higher`;
        trendBadgeEl.classList.add("bad");
      } else {
        trendBadgeEl.textContent = "Trend: no change";
        trendBadgeEl.classList.add("warn");
      }

      localStorage.setItem(key, String(currentPriceNumber));
    }

    async function fetchFlightData() {
      hideError();
      statusBadgeEl.textContent = "Fetching latest JSON...";
      statusBadgeEl.className = "badge";

      try {
        // Anti-cache query param so browser always gets latest file
        const res = await fetch(`${JSON_PATH}?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Flexible field mapping (supports different JSON shapes)
        const origin = get(data, ["origin", "from", "departure_airport", "fromAirport"], "HKG");
        const destination = get(data, ["destination", "to", "arrival_airport", "toAirport"], "CTS");
        const departDate = get(data, ["departDate", "departure_date", "outboundDate"], "");
        const returnDate = get(data, ["returnDate", "return_date", "inboundDate"], "");
        const route = `${origin} → ${destination}${departDate || returnDate ? ` · ${departDate || "--"} → ${returnDate || "--"}` : ""}`;

        const currency = get(data, ["currency"], "HKD");
        const rawPrice = get(data, ["price", "best_price", "lowest_price", "amount"], null);
        const updatedAt = get(data, ["updatedAt", "updated_at", "timestamp", "last_updated"], null);
        latestBookingUrl = get(data, ["link", "booking_url", "url"], "");

        routeEl.textContent = route;
        priceEl.textContent = formatPrice(rawPrice, currency);
        updatedAtEl.textContent = safeDate(updatedAt);

        const priceNum = Number(String(rawPrice).replace(/[^\d.-]/g, ""));
        updateTrend(priceNum);

        statusBadgeEl.textContent = "Live";
        statusBadgeEl.className = "badge ok";
      } catch (err) {
        statusBadgeEl.textContent = "Data error";
        statusBadgeEl.className = "badge bad";
        showError(`Could not load ${JSON_PATH}: ${err.message}`);
      } finally {
        nextTick = Date.now() + REFRESH_MS;
      }
    }

    // countdown display
    setInterval(() => {
      countdownEl.textContent = formatCountdown(nextTick - Date.now());
    }, 1000);

    // auto refresh every 5 min
    setInterval(fetchFlightData, REFRESH_MS);

    refreshBtn.addEventListener("click", fetchFlightData);

    openLinkBtn.addEventListener("click", () => {
      if (latestBookingUrl) {
        window.open(latestBookingUrl, "_blank", "noopener");
      } else {
        alert("No booking link found in flight.json");
      }
    });

    // initial load
    fetchFlightData();
  </script>
</body>
</html>
